name: Publish 1.21.1

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  MOD_NAME: Myotus
  MODULE: neoforge-1-21-1
  MINECRAFT_VERSION: 1.21.1
  MOD_LOADER: neoforge
  JAVA_VERSION: 21
  PUBLISH_LOADER_NAME: NeoForge

jobs:
  publish:
    name: Publish 1.21.1 (NeoForge)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, '1.21.1-') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate data
        run: ./gradlew :${{ env.MODULE }}:runData --no-daemon --stacktrace

      - name: Build release jar
        run: ./gradlew :${{ env.MODULE }}:build --no-daemon --stacktrace

      - name: Read publish metadata
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_CHANGELOG: ${{ github.event.release.body }}
        run: |
          set -euo pipefail

          mod_version=$(grep -m1 '^mod_version=' "$MODULE/gradle.properties" | cut -d= -f2- | tr -d '\r')
          version_type=$(grep -m1 '^mod_version_type=' "$MODULE/gradle.properties" | cut -d= -f2- | tr -d '\r' || true)
          version_type=${version_type:-beta}
          expected_tag="$MINECRAFT_VERSION-$mod_version"

          if [ "$EVENT_NAME" = "release" ] && [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "::error::Release tag '$RELEASE_TAG' must be '$expected_tag'."
            exit 1
          fi

          if [ -n "$RELEASE_CHANGELOG" ]; then
            changelog="$RELEASE_CHANGELOG"
          elif [ -f CHANGELOG.md ]; then
            changelog=$(cat CHANGELOG.md)
          else
            changelog="$MOD_NAME $mod_version for Minecraft $MINECRAFT_VERSION ($PUBLISH_LOADER_NAME)."
          fi

          file="$MODULE/build/libs/$MOD_NAME-$MINECRAFT_VERSION-$mod_version.jar"
          test -f "$file"
          ls -lh "$file"

          {
            echo "mod_version=$mod_version"
            echo "version_type=$version_type"
            echo "file=$file"
            echo 'changelog<<MYOTUS_CHANGELOG_EOF'
            printf '%s\n' "$changelog"
            echo 'MYOTUS_CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: ${{ steps.metadata.outputs.version_type == 'release' }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: ${{ steps.metadata.outputs.file }}
          name: ${{ env.MOD_NAME }} ${{ steps.metadata.outputs.mod_version }} for Minecraft ${{ env.MINECRAFT_VERSION }} (${{ env.PUBLISH_LOADER_NAME }})
          version: ${{ env.MINECRAFT_VERSION }}-${{ steps.metadata.outputs.mod_version }}
          version-type: ${{ steps.metadata.outputs.version_type }}
          changelog: ${{ steps.metadata.outputs.changelog }}
          loaders: ${{ env.MOD_LOADER }}
          game-versions: ${{ env.MINECRAFT_VERSION }}
          java: ${{ env.JAVA_VERSION }}
          dependencies: |
            ae2(required){modrinth:XxWD5pD3}{curseforge:223794}
            ae2wtlib(optional){modrinth:pNabrMMw}{curseforge:459929}
          retry-attempts: 2
          retry-delay: 10000
