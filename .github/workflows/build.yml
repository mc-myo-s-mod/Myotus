name: Build Mod

on:
  push:
    branches:
      - '1.20.1'
      - '1.21.1'
  pull_request:
    branches:
      - '1.20.1'
      - '1.21.1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      java_version: ${{ steps.vars.outputs.java_version }}
      mc_version: ${{ steps.vars.outputs.mc_version }}
      mod_version: ${{ steps.vars.outputs.mod_version }}
      artifact_name: ${{ steps.vars.outputs.artifact_name }}
      artifact_path: ${{ steps.vars.outputs.artifact_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read variables from gradle.properties
        id: vars
        shell: bash
        run: |
          java_version=$(grep '^java_version=' gradle.properties | cut -d'=' -f2 | tr -d ' \r')
          mc_version=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2 | tr -d ' \r')
          mod_version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | tr -d ' \r')

          echo "java_version=$java_version" >> "$GITHUB_OUTPUT"
          echo "mc_version=$mc_version" >> "$GITHUB_OUTPUT"
          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"
          echo "artifact_name=Myotus-$mc_version-$mod_version" >> "$GITHUB_OUTPUT"
          echo "artifact_path=build/libs/Myotus-$mc_version-$mod_version.jar" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: ${{ steps.vars.outputs.java_version }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: ${{ steps.vars.outputs.artifact_path }}
          if-no-files-found: error
