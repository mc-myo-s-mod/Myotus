name: Build Mod

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.minecraft }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: forge-1-20-1
            minecraft: 1.20.1
          - module: neoforge-1-21-1
            minecraft: 1.21.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java toolchains
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Generate data
        run: ./gradlew :${{ matrix.module }}:runData --no-daemon --stacktrace

      - name: Build with Gradle
        run: ./gradlew :${{ matrix.module }}:build --no-daemon --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Myotus-${{ matrix.minecraft }}-build
          path: ${{ matrix.module }}/build/libs/*.jar
          if-no-files-found: error
